<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Visionary Brief</title>
    <style>
        :root { --paper: #fffcf5; --accent: #c0392b; }
        body { background: #1a1a1a; margin: 0; font-family: 'Times New Roman', serif; }
        #authArea { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
        .auth-input { padding: 15px; font-size: 18px; border-radius: 5px; margin: 10px; width: 200px; text-align: center; }
        .auth-btn { padding: 10px 25px; background: var(--accent); color: white; border: none; cursor: pointer; }
        #mainContent { display: none; background: var(--paper); padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: auto; border: 1px solid #ddd; padding: 30px; background: #fffcf5; }
        header { border-bottom: 3px double #000; text-align: center; margin-bottom: 20px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    </style>
</head>
<body>
    <div id="authArea">
        <h1>The Visionary Brief</h1>
        <input type="password" id="passInput" class="auth-input" placeholder="Enter Code">
        <button class="auth-btn" onclick="checkPass()">Unlock</button>
    </div>

    <div id="mainContent">
        <div class="container">
            <header>
                <div style="display:flex; justify-content: space-between; font-size: 12px;">
                    <span>STRATEGIC EDITION</span>
                    <span id="currentDate">[[DATE]]</span>
                </div>
                <h1>The Visionary Brief</h1>
            </header>
            <div class="content-grid">
                <article><h2>[[TITLE1]]</h2><p>[[CONTENT1]]</p></article>
                <article><h2>[[TITLE2]]</h2><p>[[CONTENT2]]</p></article>
                <article><h2>[[TITLE3]]</h2><p>[[CONTENT3]]</p></article>
            </div>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('passInput').value === '1996') {
                document.getElementById('authArea').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else { alert('Access Denied'); }
        }
    </script>
</body>
</html>
