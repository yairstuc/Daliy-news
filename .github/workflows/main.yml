name: Daily Brief Update
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Overwrite index.html with Today Content
        run: |
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>The Visionary Brief</title>
              <style>
                  :root { --paper: #fffcf5; --accent: #c0392b; }
                  body { background: #1a1a1a; margin: 0; font-family: 'Times New Roman', serif; }
                  #authArea { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; text-align: center; }
                  .auth-input { padding: 15px; font-size: 18px; border-radius: 5px; margin: 10px; width: 200px; text-align: center; border: none; }
                  .auth-btn { padding: 10px 25px; background: var(--accent); color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
                  #mainContent { display: none; background: var(--paper); padding: 20px; min-height: 100vh; color: #1a1a1a; }
                  .container { max-width: 1000px; margin: auto; border: 1px solid #ddd; padding: 30px; background: #fffcf5; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
                  header { border-bottom: 3px double #000; text-align: center; margin-bottom: 20px; padding-bottom: 10px; }
                  .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
                  h2 { font-family: Georgia, serif; color: #1a1a1a; }
                  .vocab { border-bottom: 1px dashed var(--accent); font-weight: bold; cursor: help; }
              </style>
          </head>
          <body>
              <div id="authArea">
                  <h1>The Visionary Brief</h1>
                  <p>Private Intelligence - March 26, 2026</p>
                  <input type="password" id="passInput" class="auth-input" placeholder="Enter 1996">
                  <button class="auth-btn" onclick="checkPass()">Unlock Edition</button>
              </div>

              <div id="mainContent">
                  <div class="container">
                      <header>
                          <div style="display:flex; justify-content: space-between; font-size: 12px; font-family: Arial; font-weight: bold;">
                              <span>STRATEGIC EDITION</span>
                              <span>Thursday, March 26, 2026</span>
                          </div>
                          <h1>The Visionary Brief</h1>
                      </header>
                      <div class="content-grid">
                          <article>
                              <h3 style="color:var(--accent); font-family:Arial; font-size:12px;">MACROECONOMICS</h3>
                              <h2>The IMEC Pivot: Israel’s Indian Summer</h2>
                              <p>The structural bifurcation of global markets has reached a critical threshold. Israel serves as the vital linchpin between Indian manufacturing and European consumers. Analysts suggest that the recent shift reflects a deeper recalibration of supply chain risks.</p>
                          </article>
                          <article>
                              <h3 style="color:var(--accent); font-family:Arial; font-size:12px;">TECHNOLOGY | AI</h3>
                              <h2>Orchestrating Autonomy: The Sovereign Agent</h2>
                              <p>Agentic workflows have officially moved from experimental pilots to pivotal assets. In Q1 2026, the rise of "Sovereign Agents"—AI systems granted fiduciary responsibilities—is transforming procurement for the Israeli tech sector.</p>
                          </article>
                          <article>
                              <h3 style="color:var(--accent); font-family:Arial; font-size:12px;">HISTORY | 1947</h3>
                              <h2>The UNSCOP Precedent: Legitimacy & Resilience</h2>
                              <p>In March 1947, the Yishuv faced a global deadlock. Today, the lesson remains salient: sovereignty is earned through the demonstration of civil order and the refusal to accept a leadership vacuum.</p>
                          </article>
                      </div>
                  </div>
              </div>

              <script>
                  function checkPass() {
                      if(document.getElementById('passInput').value === '1996') {
                          document.getElementById('authArea').style.display = 'none';
                          document.getElementById('mainContent').style.display = 'block';
                          document.body.style.background = '#f4f1ea';
                      } else { alert('Access Denied'); }
                  }
              </script>
          </body>
          </html>
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Visionary-Bot"
          git config --global user.email "bot@visionary.brief"
          git add index.html
          git commit -m "Automation Update: Full Overwrite" || echo "No changes to commit"
          git push
