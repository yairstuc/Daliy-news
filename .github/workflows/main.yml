name: Daily Brief Update
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Force Update
        run: |
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html>
          <head><meta charset="UTF-8"><title>The Visionary Brief | SpaceX Edition</title></head>
          <body style="background:#fffcf5; font-family:serif; padding:50px;">
            <h1>The Visionary Brief - SUCCESS</h1>
            <p>If you see this, the bot finally worked. Today is April 4, 2026.</p>
            <h2>Macro: SpaceX IPO</h2>
            <p>SpaceX is going public at $1.75T.</p>
          </body>
          </html>
          EOF
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add index.html
          git commit -m "Final Fix"
          git push origin HEAD:main --force
