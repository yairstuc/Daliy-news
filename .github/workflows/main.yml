name: Daily Brief Update
on:
  schedule:
    - cron: '0 4 * * *' # רץ ב-06:00 בבוקר שעון ישראל
  workflow_dispatch: # מאפשר לך להריץ ידנית לבדיקה

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # קריטי: נותן לבוט רשות לכתוב למאגר
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate Today Edition
        run: |
          # כאן הבוט פשוט דורס את הקובץ עם ה-HTML המעודכן ביותר
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>The Visionary Brief</title>
              <style>
                  :root { --paper: #fffcf5; --accent: #c0392b; }
                  body { background: #1a1a1a; margin: 0; font-family: 'Times New Roman', serif; }
                  #mainContent { background: var(--paper); padding: 40px; min-height: 100vh; }
                  .container { max-width: 1000px; margin: auto; border: 1px solid #ddd; padding: 30px; }
                  h1 { text-align: center; border-bottom: 5px double #000; padding-bottom: 10px; }
                  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
              </style>
          </head>
          <body>
              <div id="mainContent">
                  <div class="container">
                      <header>
                          <div style="display:flex; justify-content: space-between; font-size: 12px; font-weight: bold;">
                              <span>STRATEGIC EDITION</span>
                              <span>Saturday, April 4, 2026</span>
                          </div>
                          <h1>The Visionary Brief</h1>
                      </header>
                      <div class="grid">
                          <article><h3>MACRO</h3><h2>SpaceX IPO Logic</h2><p>The orbital infrastructure is shifting from venture to strategic asset class...</p></article>
                          <article><h3>TECH</h3><h2>Agentic Fiduciary</h2><p>AI agents are moving into the C-suite with autonomous procurement power...</p></article>
                          <article><h3>HISTORY</h3><h2>1947: UNSCOP Gamble</h2><p>Lessons from the UN referral that defined the pre-state era...</p></article>
                      </div>
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Automated Morning Edition: $(date)" || echo "No changes to commit"
          git push origin main
