name: Daily Brief Update
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Pages
        run: |
          git config --global user.name 'Visionary-Bot'
          git config --global user.email 'bot@visionary.com'
          # כאן המערכת תבצע את העדכון האוטומטי
          echo "Automated update triggered"
