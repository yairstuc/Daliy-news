<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Visionary Brief</title>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f4f1ea; padding: 20px; text-align: center; }
        .box { background: white; padding: 40px; border: 1px solid #ccc; max-width: 600px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-variant: small-caps; border-bottom: 2px solid #000; padding-bottom: 10px; }
        p { font-size: 18px; line-height: 1.6; color: #333; }
    </style>
</head>
<body>
    <div class="box">
        <h1>The Visionary Brief</h1>
        <p>שלום יאיר, המערכת הוגדרה בהצלחה.</p>
        <p>ממחר ב-06:00 בבוקר, כאן יחכה לך העיתון המעודכן שלך עם כל הניתוחים האסטרטגיים.</p>
        <p style="font-style: italic;">(אל תשכח להוסיף את הדף הזה למסך הבית בטלפון)</p>
    </div>
</body>
</html>
