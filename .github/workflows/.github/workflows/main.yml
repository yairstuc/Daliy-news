name: The Visionary Brief Auto-Update
on:
  schedule:
    - cron: '0 5 * * *' # רץ בכל בוקר ב-07:00
  workflow_dispatch: # מאפשר לך להריץ ידנית עכשיו!

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Newspaper
        run: |
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>The Visionary Brief | April 24, 2026</title>
              <style>
                  :root { --paper: #fffcf5; --text: #1a1a1a; --accent: #c0392b; }
                  body { background-color: #1a1a1a; margin: 0; padding: 20px; font-family: 'Times New Roman', serif; color: var(--text); }
                  .paper { background: var(--paper); max-width: 1250px; margin: auto; padding: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #d3d3d3; }
                  header { text-align: center; border-bottom: 5px double #2c2c2c; margin-bottom: 40px; padding-bottom: 20px; }
                  h1 { font-size: 80px; text-transform: uppercase; margin: 0; letter-spacing: -2px; }
                  .sub-header { border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 5px 0; margin-top: 10px; display: flex; justify-content: space-between; font-family: Arial; font-weight: bold; font-size: 12px; }
                  .content { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; text-align: justify; }
                  article h2 { font-size: 26px; border-bottom: 1px solid #000; padding-bottom: 10px; margin-top: 0; }
                  article p::first-letter { float: left; font-size: 60px; line-height: 50px; padding: 4px 8px 0 0; color: var(--accent); font-weight: bold; }
                  .vocab { border-bottom: 1px dotted var(--accent); cursor: help; position: relative; }
                  .vocab:hover::after { content: attr(data-heb); position: absolute; background: var(--accent); color: white; padding: 4px 8px; border-radius: 4px; font-size: 14px; top: -35px; left: 0; white-space: nowrap; z-index: 10; }
                  .floating-img { width: 100%; height: 180px; object-fit: cover; margin-bottom: 15px; border: 1px solid #ccc; filter: sepia(0.2); }
                  .interactive { margin-top: 20px; padding-top: 10px; border-top: 1px dashed #ccc; display: flex; justify-content: space-between; align-items: center; }
                  .btn { background: none; border: 1px solid #000; padding: 5px 10px; font-size: 10px; cursor: pointer; text-transform: uppercase; font-family: Arial; }
                  .btn:hover { background: #000; color: #fff; }
                  footer { margin-top: 50px; border-top: 3px solid #000; padding-top: 20px; font-size: 13px; font-family: Arial; }
              </style>
          </head>
          <body>
              <div class="paper">
                  <header>
                      <h1>The Visionary Brief</h1>
                      <div class="sub-header">
                          <span>STRATEGIC INTELLIGENCE</span>
                          <span>FRIDAY, APRIL 24, 2026</span>
                          <span>MORNING EDITION</span>
                      </div>
                  </header>
                  <main class="content">
                      <article>
                          <span style="color:var(--accent); font-family:Arial; font-size:11px; font-weight:bold;">MACROECONOMICS</span>
                          <h2>The Liquidity Trap: Reshoring Capital</h2>
                          <img src="https://images.unsplash.com/photo-1611974717483-3600997e16ac?w=400" class="floating-img">
                          <p>The global <span class="vocab" data-heb="כלכלה">economy</span> is facing a structural shift. Financial Times reports that <span class="vocab" data-heb="נזילות">liquidity</span> is drying up as G7 nations move toward high-interest industrial subsidies...</p>
                          <div class="interactive">
                              <button class="btn" onclick="this.innerHTML='✓ READ'">Mark as Read</button>
                              <input type="range" style="width:60px; accent-color:var(--accent);">
                          </div>
                      </article>
                      <article>
                          <span style="color:var(--accent); font-family:Arial; font-size:11px; font-weight:bold;">TECHNOLOGY | AI</span>
                          <h2>The Sovereign Agent: Fiduciary AI</h2>
                          <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=400" class="floating-img">
                          <p>Agentic <span class="vocab" data-heb="תזרימי עבודה">workflows</span> have officially moved from concept to C-suite. MIT Tech Review confirms that autonomous agents now manage budgets...</p>
                          <div class="interactive">
                              <button class="btn" onclick="this.innerHTML='✓ READ'">Mark as Read</button>
                              <input type="range" style="width:60px; accent-color:var(--accent);">
                          </div>
                      </article>
                      <article>
                          <span style="color:var(--accent); font-family:Arial; font-size:11px; font-weight:bold;">HISTORY</span>
                          <h2>1947: The UNSCOP Precedent</h2>
                          <img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400" class="floating-img">
                          <p>In April 1947, David Ben-Gurion demonstrated <span class="vocab" data-heb="ריבונות">sovereignty</span> through infrastructure. Legitimate statehood was proven as a logistical reality before the UN...</p>
                          <div class="interactive">
                              <button class="btn" onclick="this.innerHTML='✓ READ'">Mark as Read</button>
                              <input type="range" style="width:60px; accent-color:var(--accent);">
                          </div>
                      </article>
                  </main>
                  <footer>
                      <strong>Bibliography:</strong> Financial Times, MIT Tech Review, Israel State Archives.
                  </footer>
              </div>
          </body>
          </html>
          EOF

      - name: Deploy to Branch
        run: |
          git config --global user.name "Visionary-Bot"
          git config --global user.email "bot@visionary.brief"
          git add index.html
          git commit -m "System Reboot: Morning Edition" || exit 0
          git push origin main --force
